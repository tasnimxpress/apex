# ============================================================
# definitions.yaml — SINGLE SOURCE OF TRUTH
# Every agent MUST read this file. No agent invents its own rule.
# If a rule needs to change, change it HERE and re-run from Agent 1.
# ============================================================

project:
  name: "Apex Asset Management - Senior Data Analyst Case Study"
  as_of_date: "2026-05-31"        # snapshot date for all "current/active" calcs.
                                  # Data runs to 2026-05; use end of last full month.
  currency: "BDT (Taka)"
  random_seed: 42                 # use everywhere reproducibility matters (clustering, samples)

# ----- File locations (the shared contract) -----
paths:
  raw: "./raw"                    # read-only source files
  clean: "./clean"               # Agent 1 outputs
  analysis: "./analysis"         # Agent 2 outputs
  qa: "./qa"                     # Agent 3 outputs
  deliverables: "./deliverables" # final notebook + deck
  decisions_log: "./decisions_log.md"

source_files:
  core_db: "Apex_Core_Database.xlsx"        # sheets: 'Master File', 'RM List'
  ledger:  "Apex_Transaction_Ledger.xlsx"   # sheet:  'Transection'

# ----- Identifiers -----
keys:
  account_key: "Registration No"            # 12,229 unique; one row per account in master
  ledger_account_key: "Account Number"      # joins to Registration No
  customer_key: "Mobile No"                 # case says customer identity = mobile; ~8,570 unique
  # Note: Customer No. (8,569 unique) ~ Mobile. Use Mobile per the brief; keep Customer No. as cross-check.

# ----- Activity Status handling -----
# Source has 5 values, NOT the 3 in the data dictionary. Counts observed:
#   Active 6925 | Closed 3500 | Inactive 1124 | Discontinue 678 | Suspended 2
# Dictionary "Discontinued" is stored as "Discontinue".
# DEFAULT RULES (change here if business disagrees):
status:
  raw_to_canonical:
    "Active": "active"
    "Closed": "closed"
    "Discontinue": "discontinued"
    "Inactive": "inactive"
    "Suspended": "suspended"
  # Churn definition. We compute TWO versions so the answer is robust:
  churn_strict:                  # conservative, matches case formula exactly
    members: ["closed", "discontinued"]
  churn_broad:                   # includes soft-churn; report alongside strict
    members: ["closed", "discontinued", "inactive"]
  primary_churn: "churn_strict"  # headline numbers use this; broad shown as sensitivity
  exclude_from_rates:            # too few / ambiguous to count in denominators
    members: ["suspended"]       # only 2 rows; exclude but log
  active_members: ["active"]

# ----- RM attribution -----
rm:
  acquisition_role: "Introducer RM CIF"   # who ONBOARDED the account -> acquisition quality
  servicing_role: "Service RM CIF"        # who HOLDS it now -> current book
  rm_list_count: 16                       # from 'RM List' sheet; reconcile against master
  # Report acquisition metrics on Introducer; portfolio/book metrics on Service. Keep separate.

# ----- Funds (canonical spellings) -----
funds:
  - "Apex Fixed Income Fund"
  - "Apex Shariah Growth Fund"
  - "Apex Balanced Opportunity Fund"
  - "Apex Capital Growth Fund"

# ----- Transaction types -----
transactions:
  type_field: "Type of Transaction"        # header in ledger (not 'Type')
  date_field: "Purchase/Surrender Date"
  amount_field: "Total"
  types: ["Purchase", "Surrender", "Dividend"]
  net_flow: "sum(Purchase) - sum(Surrender)"   # dividends excluded from net flow

# ----- Sentinels / nulls to clean -----
null_sentinels: [" ", "", "00:00:00", "1900-01-01"]

# ----- Derived band cutoffs (used for segmentation & cross-tabs) -----
bands:
  age_groups:        # left-closed: [min, max)
    - {label: "<25",   min: 18,  max: 25}
    - {label: "25-34", min: 25,  max: 35}
    - {label: "35-44", min: 35,  max: 45}
    - {label: "45-54", min: 45,  max: 55}
    - {label: "55-64", min: 55,  max: 65}
    - {label: "65+",   min: 65,  max: 200}
  age_quality_flag: {min_valid: 18, max_valid: 100}   # flag, don't drop, outside this
  installment_bands_sip:   # BDT monthly; tune after viewing distribution
    - {label: "micro <2k",     min: 0,      max: 2000}
    - {label: "small 2k-5k",   min: 2000,   max: 5000}
    - {label: "mid 5k-15k",    min: 5000,   max: 15000}
    - {label: "large 15k-50k", min: 15000,  max: 50000}
    - {label: "jumbo 50k+",    min: 50000,  max: 100000000}
  tenor_bands_months:
    - {label: "<=12",   min: 0,  max: 13}
    - {label: "13-36",  min: 13, max: 37}
    - {label: "37-60",  min: 37, max: 61}
    - {label: "60+",    min: 61, max: 100000}

# ----- Cohort / retention conventions -----
cohorts:
  vintage_grain: "month"          # onboarding cohort = First Purchase Date month
  one_year_retention:             # case-specified, Section 3
    cohort_month: "2024-05"
    measured_at: "2025-05"
    rule: "active as of 2025-05 among accounts first-purchased in 2024-05 / count first-purchased 2024-05"

# ----- Clustering config (Section 2) -----
clustering:
  features: ["age", "current_installment_amount", "tenor_in_month", "onboarding_amount"]
  categorical_features: ["investment_type", "fund"]   # use k-prototypes if mixing
  scale: "standardize_numeric"
  k_search: [2, 3, 4, 5, 6, 7, 8]
  selection: ["elbow_inertia", "silhouette"]
  level: "customer"               # cluster at customer (Mobile) level, not account level
